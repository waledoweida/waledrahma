<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>عقد قراني | وليد & رحمة</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Scheherazade+New:wght@400;600;700&family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --cream: #f5ead6; --gold: #b8892a; --gold-shine: #f0d878; }

/* Intro Styles */
#intro { position: fixed; inset: 0; background: #2c2416; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.9s; }
#intro.hide { opacity: 0; pointer-events: none; }
.intro-inner { text-align: center; color: var(--gold-shine); }
.intro-title { font-family: 'Amiri', serif; font-size: 2rem; margin-bottom: 10px; }
.intro-date { font-family: 'Amiri', serif; font-size: 1.5rem; margin-bottom: 20px; }
.count-wrap { width: 100px; height: 100px; margin: 0 auto; position: relative; }
.count-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; }
.c-bg { fill: none; stroke: #444; stroke-width: 6; }
.c-prog { fill: none; stroke: url(#progGrad); stroke-width: 6; stroke-dasharray: 283; stroke-dashoffset: 283; transition: stroke-dashoffset 0.1s linear; transform: rotate(-90deg); transform-origin: center; }
.tap-hint { margin-top: 20px; font-family: 'Amiri', serif; opacity: 0.7; }
</style>
</head>
<body>

<div id="intro">
  <div class="intro-inner">
    <h1 class="intro-title">دعوة عقد قران</h1>
    <p class="intro-date">30 / 6 / 2026</p>
    
    <div class="count-wrap">
      <svg viewBox="0 0 100 100">
        <defs>
          <linearGradient id="progGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#f0d878"/>
            <stop offset="100%" stop-color="#b8892a"/>
          </linearGradient>
        </defs>
        <circle class="c-bg" cx="50" cy="50" r="45"/>
        <circle class="c-prog" id="cProg" cx="50" cy="50" r="45"/>
      </svg>
      <div class="count-num" id="cNum">2</div>
    </div>
    <p class="tap-hint">✦ &nbsp; انتظر &nbsp; ✦</p>
  </div>
</div>

<script>
(function() {
  const intro = document.getElementById('intro');
  const cNum = document.getElementById('cNum');
  const cProg = document.getElementById('cProg');
  let startTime, current = 2;

  function showNumber(n) { cNum.textContent = n; }
  function setProgress(p) { cProg.style.strokeDashoffset = 283 - (p * 283); }

  function tick(ts) {
    if (!startTime) startTime = ts;
    let step = (ts - startTime) / 1000;
    let numToShow = Math.max(2 - step, 0);
    showNumber(Math.ceil(numToShow));
    setProgress(Math.min(step / 2, 1));
    if (step < 2) requestAnimationFrame(tick);
    else setTimeout(() => { intro.classList.add('hide'); }, 500);
  }

  setTimeout(() => { requestAnimationFrame(tick); }, 1000);
})();
</script>

</body>
</html>
